<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SecMonitor - Dashboard</title>
<style>
  :root {
    --bg: #0b0f1a;
    --panel: #121826;
    --panel-border: #1f2940;
    --text: #e6ebf5;
    --text-dim: #8b95ab;
    --accent: #3b82f6;
    --alta: #ef4444;
    --media: #f59e0b;
    --baja: #38bdf8;
    --ok: #22c55e;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: radial-gradient(circle at top left, #131c30, var(--bg) 60%);
    color: var(--text);
    min-height: 100vh;
    padding: 24px;
  }
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 12px;
    margin-bottom: 24px;
  }
  .title-block h1 {
    margin: 0;
    font-size: 24px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .title-block .sub {
    color: var(--text-dim);
    font-size: 13px;
    margin-top: 4px;
  }
  .live-dot {
    width: 9px; height: 9px; border-radius: 50%;
    background: var(--ok);
    box-shadow: 0 0 0 0 rgba(34,197,94,0.6);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(34,197,94,0.5); }
    70% { box-shadow: 0 0 0 8px rgba(34,197,94,0); }
    100% { box-shadow: 0 0 0 0 rgba(34,197,94,0); }
  }
  .controls { display: flex; align-items: center; gap: 12px; }
  .last-updated { color: var(--text-dim); font-size: 12px; }
  button {
    background: var(--accent);
    border: none;
    color: white;
    padding: 9px 16px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: transform 0.15s ease, background 0.15s ease;
  }
  button:hover { background: #2563eb; transform: translateY(-1px); }
  button:active { transform: translateY(0); }
  button.spinning svg { animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 16px;
    margin-bottom: 24px;
  }
  .card {
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 14px;
    padding: 18px 20px;
    position: relative;
    overflow: hidden;
  }
  .card .label { color: var(--text-dim); font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
  .card .value { font-size: 32px; font-weight: 700; margin-top: 6px; }
  .card.alta .value { color: var(--alta); }
  .card.media .value { color: var(--media); }
  .card.baja .value { color: var(--baja); }
  .card .bar {
    position: absolute; bottom: 0; left: 0; height: 3px; background: var(--accent); width: 100%;
  }
  .card.alta .bar { background: var(--alta); }
  .card.media .bar { background: var(--media); }
  .card.baja .bar { background: var(--baja); }

  .panel {
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 14px;
    padding: 20px;
    margin-bottom: 20px;
  }
  .panel h2 {
    margin: 0 0 14px 0;
    font-size: 15px;
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--text);
  }
  .panel h2 .count {
    background: var(--panel-border);
    color: var(--text-dim);
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 999px;
    font-weight: 600;
  }

  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th {
    text-align: left;
    color: var(--text-dim);
    font-weight: 600;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 8px 10px;
    border-bottom: 1px solid var(--panel-border);
  }
  td {
    padding: 10px;
    border-bottom: 1px solid rgba(255,255,255,0.03);
    color: var(--text);
  }
  tr:hover td { background: rgba(255,255,255,0.02); }
  .badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
  }
  .badge.alta { background: rgba(239,68,68,0.15); color: var(--alta); }
  .badge.media { background: rgba(245,158,11,0.15); color: var(--media); }
  .badge.baja { background: rgba(56,189,248,0.15); color: var(--baja); }
  .mono { font-family: 'Consolas', monospace; color: var(--text-dim); font-size: 12px; }

  .empty-state, .loading-state, .error-state {
    text-align: center;
    padding: 30px;
    color: var(--text-dim);
    font-size: 13px;
  }
  .error-state { color: var(--alta); }

  .skeleton {
    background: linear-gradient(90deg, var(--panel-border) 25%, #283149 50%, var(--panel-border) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.4s infinite;
    border-radius: 6px;
    height: 14px;
  }
  @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

  footer { text-align: center; color: var(--text-dim); font-size: 11px; margin-top: 30px; }
</style>
</head>
<body>

<div class="header">
  <div class="title-block">
    <h1><span class="live-dot"></span> SecuMonitor</h1>
    <div class="sub">Sistema de monitoreo y alertas de seguridad</div>
  </div>
  <div class="controls">
    <span class="last-updated" id="lastUpdated">Cargando...</span>
    <button id="refreshBtn" onclick="loadData()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M21 12a9 9 0 11-3-6.7M21 4v6h-6"/>
      </svg>
      Actualizar
    </button>
  </div>
</div>

<div class="cards" id="summaryCards">
  <div class="card"><div class="label">Eventos Totales</div><div class="skeleton" style="width:60%;margin-top:8px;"></div><div class="bar"></div></div>
  <div class="card alta"><div class="label">Alertas Altas</div><div class="skeleton" style="width:40%;margin-top:8px;"></div><div class="bar"></div></div>
  <div class="card media"><div class="label">Alertas Medias</div><div class="skeleton" style="width:40%;margin-top:8px;"></div><div class="bar"></div></div>
  <div class="card baja"><div class="label">Alertas Bajas</div><div class="skeleton" style="width:40%;margin-top:8px;"></div><div class="bar"></div></div>
</div>

<div class="panel">
  <h2>🚨 Alertas Recientes <span class="count" id="alertsCount">—</span></h2>
  <div id="alertsContainer"><div class="loading-state">Cargando alertas...</div></div>
</div>

<div class="panel">
  <h2>📋 Eventos Recientes <span class="count" id="eventsCount">—</span></h2>
  <div id="eventsContainer"><div class="loading-state">Cargando eventos...</div></div>
</div>

<footer>SecuMonitor v1 — Actualización automática cada 15s</footer>

<script>
// Rutas relativas: funciona tanto en local (node server.js) como ya desplegado
// en Render, siempre que este archivo se sirva desde el mismo servidor Express.
const API_BASE = '';

function timeAgo(isoString) {
  const diff = Math.floor((Date.now() - new Date(isoString).getTime()) / 1000);
  if (diff < 60) return `hace ${diff}s`;
  if (diff < 3600) return `hace ${Math.floor(diff / 60)}m`;
  if (diff < 86400) return `hace ${Math.floor(diff / 3600)}h`;
  return `hace ${Math.floor(diff / 86400)}d`;
}

function severityBadge(sev) {
  const s = (sev || 'baja').toLowerCase();
  return `<span class="badge ${s}">${s}</span>`;
}

function renderSummary(events, alerts) {
  const counts = { alta: 0, media: 0, baja: 0 };
  alerts.forEach(a => { const s = (a.severity || 'baja').toLowerCase(); if (counts[s] !== undefined) counts[s]++; });

  document.getElementById('summaryCards').innerHTML = `
    <div class="card">
      <div class="label">Eventos Totales</div>
      <div class="value">${events.length}</div>
      <div class="bar"></div>
    </div>
    <div class="card alta">
      <div class="label">Alertas Altas</div>
      <div class="value">${counts.alta}</div>
      <div class="bar"></div>
    </div>
    <div class="card media">
      <div class="label">Alertas Medias</div>
      <div class="value">${counts.media}</div>
      <div class="bar"></div>
    </div>
    <div class="card baja">
      <div class="label">Alertas Bajas</div>
      <div class="value">${counts.baja}</div>
      <div class="bar"></div>
    </div>
  `;
}

function renderAlerts(alerts) {
  document.getElementById('alertsCount').textContent = alerts.length;
  const container = document.getElementById('alertsContainer');

  if (alerts.length === 0) {
    container.innerHTML = '<div class="empty-state">No hay alertas todavía. Genera una simulación desde el backend para ver datos aquí.</div>';
    return;
  }

  const rows = alerts.map(a => `
    <tr>
      <td>${severityBadge(a.severity)}</td>
      <td>${a.rule || '—'}</td>
      <td>${a.message || '—'}</td>
      <td class="mono">${a.sourceIp || '—'}</td>
      <td class="mono">${timeAgo(a.timestamp)}</td>
    </tr>
  `).join('');

  container.innerHTML = `
    <table>
      <thead><tr><th>Severidad</th><th>Regla</th><th>Detalle</th><th>IP</th><th>Cuándo</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
  `;
}

function renderEvents(events) {
  document.getElementById('eventsCount').textContent = events.length;
  const container = document.getElementById('eventsContainer');

  if (events.length === 0) {
    container.innerHTML = '<div class="empty-state">No hay eventos todavía.</div>';
    return;
  }

  const rows = events.slice(0, 15).map(e => `
    <tr>
      <td>${e.type || '—'}</td>
      <td class="mono">${e.sourceIp || '—'}</td>
      <td class="mono">${e.port ?? '—'}</td>
      <td class="mono">${e.user || '—'}</td>
      <td class="mono">${timeAgo(e.timestamp)}</td>
    </tr>
  `).join('');

  container.innerHTML = `
    <table>
      <thead><tr><th>Tipo</th><th>IP</th><th>Puerto</th><th>Usuario</th><th>Cuándo</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
  `;
}

async function loadData() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');
  btn.disabled = true;

  try {
    const [eventsRes, alertsRes] = await Promise.all([
      fetch(`${API_BASE}/api/events?limit=50`),
      fetch(`${API_BASE}/api/alerts?limit=50`),
    ]);

    if (!eventsRes.ok || !alertsRes.ok) throw new Error('Respuesta no válida del servidor');

    const events = await eventsRes.json();
    const alerts = await alertsRes.json();

    renderSummary(events, alerts);
    renderAlerts(alerts);
    renderEvents(events);

    document.getElementById('lastUpdated').textContent =
      'Última actualización: ' + new Date().toLocaleTimeString('es-CL');
  } catch (err) {
    console.error(err);
    document.getElementById('alertsContainer').innerHTML =
      `<div class="error-state">No se pudo conectar con el backend (${err.message}). ¿Está corriendo el servidor?</div>`;
    document.getElementById('lastUpdated').textContent = 'Error de conexión';
  } finally {
    btn.classList.remove('spinning');
    btn.disabled = false;
  }
}

loadData();
setInterval(loadData, 15000);
</script>
</body>
</html>
